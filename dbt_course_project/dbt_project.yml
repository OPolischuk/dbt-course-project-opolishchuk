# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dbt_course_project'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_course_project'

vars:
  time_traps:
    - name: "Time to Start"
      start_status: "SCHEDULED"
      end_status: "IN_PROGRESS"
    - name: "Interview Duration"
      start_status: "IN_PROGRESS"
      end_status: "COMPLETED"

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
models:
  dbt_course_project:
    example:
      +materialized: view
    elementary:
      +schema: elementary

    # Layer 1: Staging (Bronze)
    staging:
      +schema: staging
      +materialized: view

    # Layer 2: Silver (Intermediate)
    silver:
      +schema: intermediate
      +materialized: view

    # Layer 3: Gold (Mart)
    gold:
      +schema: mart
      +materialized: table
      +required_tests:
        unique: 1
        not_null: 1
