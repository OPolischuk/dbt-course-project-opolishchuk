version: 2

sources:
  - name: snowflake_raw
    description: "This database contains raw HR data imported from the source system."
    database: DBT_PROJECT
    schema: RAW
    loaded_at_field: "TO_TIMESTAMP(_UPDATED_MICROS::bigint / 1000000)"

    tables:
      - name: candidates
        description: "Table containing personal details of job applicants."
        columns:
          - name: candidate_id
            tests:
              - unique
              - not_null

      - name: employees
        description: "Records of current and former staff members."
        freshness:
          warn_after: {count: 1, period: hour}
          error_after: {count: 1000, period: day}

      - name: interviews
        description: "Details of scheduled and completed job interviews."
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: candidate_id
            tests:
              - not_null
              - relationships:
                  to: source('snowflake_raw', 'candidates')
                  field: candidate_id

      - name: job_functions
        description: "Reference table defining various job roles."
        columns:
          - name: job_function_id
            tests:
              - unique
              - not_null

      - name: skills
        description: "A list of technical and soft skills."
