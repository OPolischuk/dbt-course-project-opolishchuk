repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace

-   repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.1.0
    hooks:
    -   id: sqlfluff-lint
        additional_dependencies: ['dbt-snowflake==1.8.0', 'sqlfluff-templater-dbt==3.1.0']
    -   id: sqlfluff-fix
        additional_dependencies: ['dbt-snowflake==1.8.0', 'sqlfluff-templater-dbt==3.1.0']
